config_type: rl_train

working_dir: trials/reinforce_mlp_four_rooms

rl_training_dir: rl_training

# ---- environment (env_factory): describes ONE env; n_envs lives in training_cfg ----
envs:
  id: MiniGrid-FourRooms-v0
  env_kwargs:
    max_steps: 512

# ---- agent (agent_factory -> REINFORCE) ----
agent:
  id: REINFORCE
  lr: 0.001
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 0.0
  grad_norm_clip: 1.0

  # ---- policy model (model_factory -> MLP) ----
  model:
    id: MLP
    d_obj: 8
    d_color: 4
    d_state: 2
    hidden_dims: [96, 48]

# ---- passed as **kwargs to REINFORCE.train() ----
training_cfg:
  ent_coef: 0.01
  num_timesteps: 5000000
  n_envs: 64
  save_interval: null
  video_interval: 200000
  video_fps: 5
  seed: 42
