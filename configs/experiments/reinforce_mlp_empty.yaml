config_type: rl_train

working_dir: trials/reinforce_mlp_empty

rl_training_dir: rl_training

# ---- environment (env_factory): describes ONE env; n_envs lives in training_cfg ----
envs:
  id: MiniGrid-EmptyEnv
  env_kwargs:
    size: 9
    agent_start_pos: null

# ---- agent (agent_factory -> REINFORCE) ----
agent:
  id: REINFORCE
  lr: 0.001
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 0.0
  grad_norm_clip: 1.0

  # ---- policy model (model_factory -> MLP) ----
  model:
    id: MLP
    d_obj: 8
    d_color: 4
    d_state: 2
    hidden_dims: [96, 48]

# ---- passed as **kwargs to REINFORCE.train() ----
training_cfg:
  num_timesteps: 500000
  n_envs: 16
  save_interval: null
  video_interval: 20000
  video_fps: 8
  seed: 42
